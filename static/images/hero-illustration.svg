<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 640" fill="none" role="img" aria-labelledby="heroArtTitle">
  <title id="heroArtTitle">Open book with genre bars under a teal arch, botanical leaves, and gold stars</title>
  <defs>
    <linearGradient id="archGrad" x1="180" y1="20" x2="380" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42797c"/>
      <stop offset="1" stop-color="#2f5f62"/>
    </linearGradient>
    <linearGradient id="pageCream" x1="80" y1="470" x2="480" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f1e5"/>
      <stop offset="0.5" stop-color="#f2e6d2"/>
      <stop offset="1" stop-color="#e5d3b5"/>
    </linearGradient>
    <linearGradient id="pageShade" x1="280" y1="450" x2="280" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#efe1c8"/>
      <stop offset="1" stop-color="#d9c39d"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="250" y1="450" x2="310" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#cbb892"/>
      <stop offset="0.5" stop-color="#e2cfb0"/>
      <stop offset="1" stop-color="#b89f76"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#102b43" flood-opacity="0.18"/>
    </filter>
    <filter id="barShadow" x="-12%" y="-50%" width="124%" height="220%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#102b43" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- Soft sage abstract ovals -->
  <ellipse cx="438" cy="500" rx="156" ry="108" fill="#9db2a2" opacity="0.42"/>
  <ellipse cx="475" cy="545" rx="118" ry="78" fill="#9db2a2" opacity="0.28"/>
  <ellipse cx="118" cy="525" rx="102" ry="68" fill="#9db2a2" opacity="0.24"/>
  <ellipse cx="300" cy="590" rx="190" ry="46" fill="#9db2a2" opacity="0.16"/>

  <!-- Dark teal rounded arch -->
  <path d="M168 445 V132 C168 58 222 22 280 22 C338 22 392 58 392 132 V445 Z"
        fill="url(#archGrad)" filter="url(#softShadow)"/>
  <path d="M186 438 V138 C186 78 228 48 280 48 C332 48 374 78 374 138 V438 Z"
        fill="#255558" opacity="0.28"/>

  <!-- Stars inside arch -->
  <g fill="#d5a83f">
    <path transform="translate(246 82) scale(0.52)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(318 118) scale(0.34)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(220 148) scale(0.26)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <circle cx="304" cy="168" r="1.7"/>
    <circle cx="248" cy="198" r="1.3"/>
    <circle cx="336" cy="198" r="1.1" fill="#f2e6d2"/>
  </g>

  <!-- Botanical leaves - left -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M92 478 C64 418 82 352 124 312" stroke="#d5a83f" stroke-width="2.3" fill="none"/>
    <path d="M124 312 C98 330 86 364 96 392 C108 364 118 338 124 312 Z" fill="#d5a83f" opacity="0.55" stroke="#d5a83f" stroke-width="1"/>
    <path d="M112 344 C84 364 78 402 94 430 C108 404 114 372 112 344 Z" fill="#28614e" opacity="0.35" stroke="#28614e" stroke-width="1"/>
    <path d="M102 380 C76 404 82 444 108 466 C116 438 114 404 102 380 Z" fill="#d5a83f" opacity="0.4" stroke="#d5a83f" stroke-width="1"/>
    <path d="M66 452 C48 412 60 372 90 348" stroke="#9db2a2" stroke-width="1.9" fill="none"/>
    <path d="M90 348 C70 366 64 400 76 430 C88 404 92 374 90 348 Z" fill="#9db2a2" opacity="0.45" stroke="#9db2a2" stroke-width="1"/>
    <path d="M74 386 C52 410 58 450 84 470 C92 444 88 410 74 386 Z" fill="#28614e" opacity="0.28" stroke="#28614e" stroke-width="1"/>
  </g>

  <!-- Botanical leaves - right -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M462 468 C500 410 492 340 452 300" stroke="#d5a83f" stroke-width="2.3" fill="none"/>
    <path d="M452 300 C480 322 492 360 476 394 C464 364 456 328 452 300 Z" fill="#d5a83f" opacity="0.55" stroke="#d5a83f" stroke-width="1"/>
    <path d="M464 336 C494 360 500 400 480 432 C468 404 464 368 464 336 Z" fill="#28614e" opacity="0.35" stroke="#28614e" stroke-width="1"/>
    <path d="M472 378 C500 406 496 448 470 470 C462 442 464 406 472 378 Z" fill="#d5a83f" opacity="0.4" stroke="#d5a83f" stroke-width="1"/>
    <path d="M498 450 C522 410 514 366 478 342" stroke="#9db2a2" stroke-width="1.9" fill="none"/>
    <path d="M478 342 C504 360 514 398 502 432 C490 404 482 368 478 342 Z" fill="#9db2a2" opacity="0.45" stroke="#9db2a2" stroke-width="1"/>
  </g>

  <!-- Open book with layered curved pages -->
  <g filter="url(#softShadow)">
    <!-- Cover base -->
    <path d="M48 492
             C118 458 190 444 280 456
             C370 444 442 458 512 492
             C518 528 470 568 280 584
             C90 568 42 528 48 492 Z"
          fill="#c4ae84"/>

    <!-- Deep page layers left -->
    <path d="M62 488 C128 452 192 440 278 456 L278 556 C192 540 128 548 62 574 Z" fill="#dcc7a4"/>
    <path d="M72 480 C134 448 196 438 278 452 L278 544 C196 528 134 536 72 560 Z" fill="#e7d4b4"/>
    <path d="M84 472 C142 444 200 436 278 448 L278 528 C200 514 142 520 84 544 Z" fill="url(#pageCream)"/>
    <path d="M98 464 C150 440 206 434 278 444 L278 512 C206 500 150 504 98 526 Z" fill="#f7f0e4"/>
    <path d="M112 456 C160 438 210 432 278 440 L278 496 C210 486 160 488 112 508 Z" fill="url(#pageCream)"/>

    <!-- Deep page layers right -->
    <path d="M498 488 C432 452 368 440 282 456 L282 556 C368 540 432 548 498 574 Z" fill="#dcc7a4"/>
    <path d="M488 480 C426 448 364 438 282 452 L282 544 C364 528 426 536 488 560 Z" fill="#e7d4b4"/>
    <path d="M476 472 C418 444 360 436 282 448 L282 528 C360 514 418 520 476 544 Z" fill="url(#pageCream)"/>
    <path d="M462 464 C410 440 354 434 282 444 L282 512 C354 500 410 504 462 526 Z" fill="#f7f0e4"/>
    <path d="M448 456 C400 438 350 432 282 440 L282 496 C350 486 400 488 448 508 Z" fill="url(#pageCream)"/>

    <!-- Center gutter -->
    <path d="M266 444 C274 460 278 500 280 556 C282 500 286 460 294 444 C286 440 274 440 266 444 Z"
          fill="url(#spineGrad)"/>
    <path d="M278 448 C279 480 280 520 280 556" stroke="#b89f76" stroke-width="1.5" opacity="0.55"/>

    <!-- Page curve detail lines -->
    <path d="M118 478 C168 458 220 454 270 464" stroke="#d4bf9a" stroke-width="1.1" opacity="0.75"/>
    <path d="M128 496 C174 478 224 474 272 484" stroke="#d4bf9a" stroke-width="1" opacity="0.55"/>
    <path d="M138 514 C182 498 228 496 274 504" stroke="#d4bf9a" stroke-width="1" opacity="0.4"/>
    <path d="M442 478 C392 458 340 454 290 464" stroke="#d4bf9a" stroke-width="1.1" opacity="0.75"/>
    <path d="M432 496 C386 478 336 474 288 484" stroke="#d4bf9a" stroke-width="1" opacity="0.55"/>
    <path d="M422 514 C378 498 332 496 286 504" stroke="#d4bf9a" stroke-width="1" opacity="0.4"/>

    <!-- Soft inner shadow near spine -->
    <path d="M248 452 C260 470 266 510 268 548 C255 530 245 490 248 452 Z" fill="#cbb892" opacity="0.22"/>
    <path d="M312 452 C300 470 294 510 292 548 C305 530 315 490 312 452 Z" fill="#cbb892" opacity="0.22"/>
  </g>

  <!-- Genre bars -->
  <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="2.4" fill="#ffffff">
    <!-- BOOKMIND -->
    <g filter="url(#barShadow)">
      <rect x="148" y="168" width="264" height="48" rx="15" fill="#28614e"/>
      <rect x="392" y="176" width="22" height="32" rx="9" fill="#ffffff"/>
      <g transform="translate(168 179)" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4v16"/>
        <path d="M12 4c-2.2-1.4-5.5-1.6-8 0v14c2.5-1.6 5.8-1.4 8 0"/>
        <path d="M12 4c2.2-1.4 5.5-1.6 8 0v14c-2.5-1.6-5.8-1.4-8 0"/>
      </g>
      <text x="212" y="198">BOOKMIND</text>
    </g>

    <!-- MYSTERY -->
    <g filter="url(#barShadow)">
      <rect x="132" y="232" width="296" height="48" rx="15" fill="#5f7a68"/>
      <rect x="408" y="240" width="22" height="32" rx="9" fill="#ffffff"/>
      <g transform="translate(156 243)" stroke="#ffffff" stroke-width="1.75" fill="none" stroke-linecap="round">
        <circle cx="9" cy="9" r="6.2"/>
        <path d="M13.8 13.8 L19.5 19.5"/>
      </g>
      <text x="202" y="262">MYSTERY</text>
    </g>

    <!-- ROMANCE -->
    <g filter="url(#barShadow)">
      <rect x="142" y="296" width="276" height="48" rx="15" fill="#376f72"/>
      <rect x="398" y="304" width="22" height="32" rx="9" fill="#ffffff"/>
      <g transform="translate(164 307)" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20.5 C12 20.5 2.5 13.2 2.5 8 C2.5 4.8 5 2.8 7.8 2.8 C9.9 2.8 11.3 4.1 12 5.5 C12.7 4.1 14.1 2.8 16.2 2.8 C19 2.8 21.5 4.8 21.5 8 C21.5 13.2 12 20.5 12 20.5 Z"/>
      </g>
      <text x="206" y="326">ROMANCE</text>
    </g>

    <!-- FANTASY -->
    <g filter="url(#barShadow)">
      <rect x="126" y="360" width="308" height="48" rx="15" fill="#d5a83f"/>
      <rect x="414" y="368" width="22" height="32" rx="9" fill="#ffffff"/>
      <g transform="translate(148 369)" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 21 V9"/>
        <path d="M4.5 21 H11.5"/>
        <path d="M8 9 L5 3 H11 L8 9 Z"/>
        <path d="M5.5 5.5 H10.5"/>
      </g>
      <text x="196" y="390">FANTASY</text>
    </g>

    <!-- THRILLER -->
    <g filter="url(#barShadow)">
      <rect x="138" y="424" width="282" height="48" rx="15" fill="#102b43"/>
      <rect x="400" y="432" width="22" height="32" rx="9" fill="#ffffff"/>
      <g transform="translate(158 433)" stroke="#ffffff" stroke-width="1.55" fill="none" stroke-linecap="round">
        <path d="M12 3.5c-2.4 0-4.2 1.7-4.2 4.1 0 1.5.7 2.7 1.7 3.5"/>
        <path d="M12 3.5c2.4 0 4.2 1.7 4.2 4.1 0 1.5-.7 2.7-1.7 3.5"/>
        <path d="M9.5 11.1c-1.3.8-2.1 2-2.1 3.5 0 2.6 2.1 4.6 4.6 4.6s4.6-2 4.6-4.6c0-1.5-.8-2.7-2.1-3.5"/>
        <path d="M12 7.2c-1.1 0-1.9.8-1.9 1.9"/>
        <path d="M12 7.2c1.1 0 1.9.8 1.9 1.9"/>
        <path d="M10.4 12.4c-.7.5-1.1 1.2-1.1 2.1 0 1.5 1.2 2.7 2.7 2.7s2.7-1.2 2.7-2.7c0-.9-.4-1.6-1.1-2.1"/>
      </g>
      <text x="204" y="454">THRILLER</text>
    </g>
  </g>

  <!-- Floating stars and sparkles -->
  <g fill="#d5a83f">
    <path transform="translate(408 58) scale(0.72)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(458 108) scale(0.4)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(88 108) scale(0.36)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(508 248) scale(0.3)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(62 248) scale(0.28)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(438 318) scale(0.24)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <path transform="translate(505 390) scale(0.22)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>
    <circle cx="428" cy="150" r="2"/>
    <circle cx="488" cy="182" r="1.5"/>
    <circle cx="84" cy="182" r="1.6"/>
    <circle cx="528" cy="330" r="1.4"/>
    <circle cx="52" cy="330" r="1.3"/>
    <circle cx="512" cy="420" r="1.7"/>
    <circle cx="68" cy="420" r="1.4"/>
    <circle cx="452" cy="62" r="1.2"/>
    <circle cx="122" cy="78" r="1.1"/>
    <circle cx="500" cy="140" r="1"/>
  </g>
</svg>
